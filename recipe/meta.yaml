{% set name = "jupyter_core" %}
{% set version = "5.9.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 4d09aaff303b9566c3ce657f580bd089ff5c91f5f89cf7d8846c3cdf465b5508

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - jupyter = jupyter_core.command:main
    - jupyter-migrate = jupyter_core.migrate:main
    - jupyter-troubleshoot = jupyter_core.troubleshoot:main

requirements:
  host:
    - pip
    - python
    - hatchling >=1.4
  run:
    - python
    - pywin32 >=300  # [win]
    - traitlets >=5.3
    - platformdirs >=2.5

# linux shebang lines have a length limit longer than the placeholder test prefix
{% set skip_tests = [
  "--deselect=tests/test_command.py::test_not_on_path",
  "--deselect=tests/test_command.py::test_path_priority",
  "--deselect=tests/test_command.py::test_argv0"
] %}

test:
  source_files:
    - tests
    - pyproject.toml
  requires:
    - pytest <9
    - ipykernel
    - pytest-timeout
    - pip
  commands:
    - pip check
    - jupyter -h
    - jupyter-migrate -h
    - jupyter-troubleshoot --help
    - pytest -vv {{ skip_tests | join(" ") }} # [linux]
    - pytest -vv # [not linux]
  imports:
    - jupyter_core
    - jupyter_core.utils

about:
  home: https://jupyter.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Core common functionality of Jupyter projects.
  description: |
    Jupyter core package. A base package on which Jupyter projects rely.
    This package contains base application classes and configuration inherited by other projects.
  dev_url: https://github.com/jupyter/jupyter_core
  doc_url: https://jupyter-core.readthedocs.io

extra:
  recipe-maintainers:
    - jakirkham
    - pelson
    - minrk
    - ocefpaf
    - bollwyvl
    - Carreau
